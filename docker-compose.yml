services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: ucat-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-ucat_platform}
      DB_USERNAME: ${DB_USERNAME:-ucat_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ucat

  web:
    image: nginx:1.27-alpine
    container_name: ucat-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - ucat

  node:
    image: node:24-alpine
    container_name: ucat-node
    working_dir: /var/www/html
    command: sh -c "npm install && npm run build"
    volumes:
      - ./:/var/www/html
    networks:
      - ucat

  db:
    image: mysql:8.4
    container_name: ucat-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ucat_platform}
      MYSQL_USER: ${DB_USERNAME:-ucat_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      timeout: 5s
      retries: 20
      interval: 5s
    networks:
      - ucat

volumes:
  mysql_data:

networks:
  ucat:
    driver: bridge
